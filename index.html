<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cinema</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* HEADER */
        .header {
            background: #141414;
            padding: 15px 4%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #e50914;
        }
        .nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 25px;
            font-size: 14px;
        }
        
        /* TABS */
        .tabs {
            display: flex;
            gap: 10px;
            padding: 20px 4%;
            background: #0f0f0f;
        }
        .tab {
            padding: 10px 25px;
            background: #1f1f1f;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .tab:hover, .tab.active {
            background: #e50914;
        }
        
        /* SEARCH */
        .search-box {
            padding: 10px 4%;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background: #1f1f1f;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        /* MOVIE GRID */
        .section {
            padding: 20px 4%;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        
        /* MOVIE CARD */
        .movie {
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .movie:hover {
            transform: scale(1.05);
        }
        .movie img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }
        .movie-info {
            padding: 10px;
        }
        .movie-title {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 12px;
            color: #888;
        }
        
        /* VIDEO PLAYER */
        .player-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            flex-direction: column;
        }
        .player-overlay.active {
            display: flex;
        }
        .player-header {
            padding: 15px 4%;
            background: #141414;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .servers {
            display: flex;
            gap: 10px;
        }
        .server-btn {
            padding: 8px 20px;
            background: #1f1f1f;
            border: none;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .server-btn.active {
            background: #e50914;
        }
        .player-video {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        video, iframe {
            width: 100%;
            max-width: 1000px;
            max-height: 70vh;
            border: none;
        }
        .close-btn {
            font-size: 28px;
            cursor: pointer;
        }
        
        /* EPISODES */
        .episodes {
            padding: 15px 4%;
            background: #141414;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }
        .episode {
            padding: 10px 20px;
            background: #1f1f1f;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        .episode.active {
            background: #e50914;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="logo">YOURCINEMA</div>
        <div class="nav">
            <a href="#" onclick="showCategory('all')">Home</a>
            <a href="#" onclick="showCategory('movies')">Movies</a>
            <a href="#" onclick="showCategory('series')">Series</a>
            <a href="#" onclick="showCategory('anime')">Anime</a>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" onclick="filterType('all')">All</div>
        <div class="tab" onclick="filterType('movies')">Movies</div>
        <div class="tab" onclick="filterType('series')">TV Series</div>
        <div class="tab" onclick="filterType('anime')">Anime</div>
    </div>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" placeholder="Search movies..." onkeyup="search(this.value)">
    </div>

    <!-- MOVIES SECTION -->
    <div class="section" id="moviesSection">
        <div class="section-title">🔥 Trending</div>
        <div class="grid" id="movieGrid"></div>
    </div>

    <!-- VIDEO PLAYER -->
    <div class="player-overlay" id="player">
        <div class="player-header">
            <div>
                <h3 id="playerTitle">Movie Title</h3>
                <div class="servers" id="servers"></div>
            </div>
            <div class="close-btn" onclick="closePlayer()">×</div>
        </div>
        <div class="episodes" id="episodes"></div>
        <div class="player-video">
            <video id="videoPlayer" controls playsinline></video>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════
        // YOUR CONTENT - ADD YOUR MOVIES HERE
        // ═══════════════════════════════════════════════════

        const content = [
            {
                id: 1,
                title: "Movie One",
                year: "2024",
                type: "movies",
                category: "action",
                poster: "https://via.placeholder.com/300x450/1a1a2e/ffffff?text=Movie+1",
                servers: [
                    { name: "Server 1", url: "https://example.com/video1.mp4" },
                    { name: "Server 2", url: "https://example.com/video1-backup.mp4" }
                ]
            },
            {
                id: 2,
                title: "Movie Two",
                year: "2024",
                type: "movies",
                category: "drama",
                poster: "https://via.placeholder.com/300x450/2e1a1a/ffffff?text=Movie+2",
                servers: [
                    { name: "Server 1", url: "https://example.com/video2.mp4" },
                    { name: "Server 2", url: "https://example.com/video2-backup.mp4" }
                ]
            },
            {
                id: 3,
                title: "TV Series One",
                year: "2024",
                type: "series",
                category: "drama",
                poster: "https://via.placeholder.com/300x450/1a2e1a/ffffff?text=Series+1",
                episodes: [
                    { title: "Episode 1", servers: [{ name: "Server 1", url: "https://example.com/ep1.mp4" }] },
                    { title: "Episode 2", servers: [{ name: "Server 1", url: "https://example.com/ep2.mp4" }] }
                ]
            },
            {
                id: 4,
                title: "Anime One",
                year: "2024",
                type: "anime",
                category: "action",
                poster: "https://via.placeholder.com/300x450/2e2e1a/ffffff?text=Anime+1",
                servers: [
                    { name: "Server 1", url: "https://example.com/anime1.mp4" }
                ]
            }
            // ADD MORE CONTENT HERE
        ];

        // ═══════════════════════════════════════════════════
        // DON'T TOUCH BELOW
        // ═══════════════════════════════════════════════════

        let currentContent = null;
        let currentEpisode = 0;

        function renderGrid(items) {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'movie';
                div.innerHTML = `
                    <img src="${item.poster}" alt="${item.title}" loading="lazy">
                    <div class="movie-info">
                        <div class="movie-title">${item.title}</div>
                        <div class="movie-meta">
                            <span>${item.year}</span>
                            <span>${item.type === 'movies' ? 'Movie' : item.type === 'series' ? 'Series' : 'Anime'}</span>
                        </div>
                    </div>
                `;
                div.onclick = () => play(item);
                grid.appendChild(div);
            });
        }

        function play(item) {
            currentContent = item;
            currentEpisode = 0;
            
            document.getElementById('playerTitle').textContent = item.title;
            
            // Render servers
            const serversDiv = document.getElementById('servers');
            serversDiv.innerHTML = '';
            
            const sources = item.episodes ? item.episodes[0].servers : item.servers;
            
            sources.forEach((server, index) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn' + (index === 0 ? ' active' : '');
                btn.textContent = server.name;
                btn.onclick = () => switchServer(server.url, index);
                serversDiv.appendChild(btn);
            });
            
            // Render episodes for series
            const episodesDiv = document.getElementById('episodes');
            episodesDiv.innerHTML = '';
            if (item.episodes) {
                item.episodes.forEach((ep, index) => {
                    const btn = document.createElement('div');
                    btn.className = 'episode' + (index === 0 ? ' active' : '');
                    btn.textContent = ep.title;
                    btn.onclick = () => switchEpisode(index);
                    episodesDiv.appendChild(btn);
                });
                episodesDiv.style.display = 'flex';
            } else {
                episodesDiv.style.display = 'none';
            }
            
            // Play first source
            const video = document.getElementById('videoPlayer');
            video.src = sources[0].url;
            document.getElementById('player').classList.add('active');
            document.body.style.overflow = 'hidden';
            video.play().catch(e => console.log('Autoplay blocked'));
        }

        function switchServer(url, index) {
            document.querySelectorAll('.server-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            const video = document.getElementById('videoPlayer');
            video.src = url;
            video.play();
        }

        function switchEpisode(index) {
            currentEpisode = index;
            document.querySelectorAll('.episode').forEach((btn, i) => {
                btn.classList.toggle('active', i === index);
            });
            
            const episode = currentContent.episodes[index];
            const serversDiv = document.getElementById('servers');
            serversDiv.innerHTML = '';
            
            episode.servers.forEach((server, i) => {
                const btn = document.createElement('button');
                btn.className = 'server-btn' + (i === 0 ? ' active' : '');
                btn.textContent = server.name;
                btn.onclick = () => switchServer(server.url, i);
                serversDiv.appendChild(btn);
            });
            
            const video = document.getElementById('videoPlayer');
            video.src = episode.servers[0].url;
            video.play();
        }

        function closePlayer() {
            document.getElementById('player').classList.remove('active');
            document.getElementById('videoPlayer').pause();
            document.getElementById('videoPlayer').src = '';
            document.body.style.overflow = '';
        }

        function showCategory(cat) {
            if (cat === 'all') {
                renderGrid(content);
            } else {
                renderGrid(content.filter(item => item.type === cat));
            }
        }

        function filterType(type) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.toggle('active', tab.textContent.toLowerCase().includes(type === 'all' ? 'all' : type === 'series' ? 'series' : type === 'movies' ? 'movies' : 'anime'));
            });
            showCategory(type === 'all' ? 'all' : type);
        }

        function search(query) {
            const filtered = content.filter(item => 
                item.title.toLowerCase().includes(query.toLowerCase())
            );
            renderGrid(filtered);
        }

        // Initial render
        renderGrid(content);
    </script>
</body>
</html>
